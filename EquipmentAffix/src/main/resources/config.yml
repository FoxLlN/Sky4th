# EquipmentAffix 配置文件

# 熟练度配置
proficiency:
  level_requirements:
    - 100   # 0级升到1级
    - 250   # 1级升到2级
    - 500   # 2级升到3级
    - 1000  # 3级升到4级
    - 2000  # 4级升到5级

# 装备属性配置
equipment:
  # 最大闪避率（0.0 - 1.0）
  max_dodge_chance: 0.8

  # 最大抗击退（0.0 - 1.0）
  max_knockback_resistance: 1.0

  # 最大移动惩罚（0.0 - 1.0）
  max_movement_penalty: 1.0

  # 最大饥饿惩罚（0.0 - 1.0）
  max_hunger_penalty: 1.0

  # 闪避词条基础加成（每级增加的闪避率）
  dodge_affix_base_chance: 0.05

# 需要移除原版合成配方的物品材质列表
# 使用材质名称（Material），如 DIAMOND_SWORD, IRON_CHESTPLATE 等
# 注意：只包含Minecraft 1.21.1中确实有合成配方的物品

# 护甲类（所有材质的护甲都有合成配方）
