# BetterVillage 配置文件
# 村民自定义交易配置

# 是否启用自定义交易
enabled: true

# 村庄村民上限 公式： base + area/population_per_area
villager:
  base_population: 5  # 村庄基础人数
  population_per_area: 400  # 每400平方米增加1个村民
  restrict_movement: true  # 是否启用村民移动限制
  check_interval: 20        # 检查间隔（tick，20tick=1秒）

# 村庄保护配置
protection:
  # 交易禁令时长配置（单位：分钟）
  trade-ban:
    villager-kill: 10  # 击杀村民后的交易禁令时长
    iron-golem-kill: 5  # 击杀铁傀儡后的交易禁令时长

