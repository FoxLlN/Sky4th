# 2. 地牢配置（每个地牢独立）
dungeons:
  trialchambers:
    # 地牢 ID（用于实际世界名称和指令参数，现在 id 作为世界名称的基础部分）
    id: "trialchambers"
    # 地牢中文显示名称（用于提示信息）
    world-name: "试炼"

    # 模板世界文件夹路径（相对路径: "trialchambers_template"
    template-world-path: "trialchambers_template"

    # 进入地牢所需费用（信用点，0 表示免费）
    cost: 0

    # 最大实例数和每实例最大玩家数
    max-instances: 3
    max-players-per-instance: 9

    duration-minutes: 45  # 地牢持续时间（分钟），0表示无限

    # 出生点列表（在副本世界中的坐标）
    spawn-points:
      - x: 49.0
        y: 4.0
        z: 38.0
        name: "SW出生点1"
      - x: 21.0
        y: -11.0
        z: 29.0
        name: "SW出生点2"
      - x: 3.0
        y: -11.0
        z: 18.0
        name: "SW出生点3"
    # 撤离点区域列表（在副本世界中的坐标）
    exit-regions:
      - min-x: -11
        min-y: -18
        min-z: 31
        max-x: -8
        max-y: -15
        max-z: 35
        world: "trialchambers_world"
        name: "水下撤离点"
  
    # 玩家在撤离点停留多少秒后自动退出副本
    exit-wait-seconds: 10

    # 地牢科技树等级加成（0 级无加成；血量为半心数，如 2 = 1 心；player-damage-reduction 为 0~1，如 0.03 = 3%）
