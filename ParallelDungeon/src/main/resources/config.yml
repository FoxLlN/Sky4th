    - "stats"
    - "session.lock"

  # ==============================
  # 可搜索容器 & 掉落物配置
  # ==============================

  # 容器物品数量范围配置（根据容器体积决定）
  # volume-range: 容器体积范围（方块数）
  # min-items: 最少物品数量
  # max-items: 最多物品数量
  container-item-counts:
    - volume-range: 1
      min-items: 1
      max-items: 3
    - volume-range: 2-3
      min-items: 2
      max-items: 4
    - volume-range: 4-6
      min-items: 3
      max-items: 5
    - volume-range: 7-9
      min-items: 4
      max-items: 6
    - volume-range: 10+
      min-items: 4
      max-items: 6

  # 各个物品等级（品级）的基础搜索时间（秒）
  # search-time 保持不变
  # 同时在这里按"容器等级"配置权重：
  #   weight-level-1: 等级1容器中的权重
  #   weight-level-2: 等级2容器中的权重
  #   weight-level-3: 等级3容器中的权重
  loot-tiers:
    common:
      search-time: 4
      weight-level-1: 60
      weight-level-2: 30
      weight-level-3: 0
    uncommon:
      search-time: 6
      weight-level-1: 20
      weight-level-2: 20
      weight-level-3: 30
    rare:
      search-time: 8
      weight-level-1: 13
      weight-level-2: 36
      weight-level-3: 48
    epic:
      search-time: 10
      weight-level-1: 6
      weight-level-2: 12
      weight-level-3: 18
    legendary:
      search-time: 15
      weight-level-1: 0.5
      weight-level-2: 1
      weight-level-3: 3
    mythic:
      search-time: 20
      weight-level-1: 0.5
      weight-level-2: 1
      weight-level-3: 2

  # 斥候技能「下次搜索高品质概率提升」：各品级权重的比例系数（相对当前容器等级权重的倍数）
