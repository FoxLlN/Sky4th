    - "&a  level [玩家] &7- 查看地牢科技树等级"
    - "&a  setlevel <玩家> <等级> &7- 设置地牢科技树等级（管理员）"
    - "&a  reload <地牢名|ALL> &7- 重新加载配置（管理员）"
    - "&a  reset <地牢名|ALL> &7- 重置副本世界（管理员）"
    - "&a  create <地牢名> &7- 创建新的地牢实例（管理员）"
    - "&a  delete <实例ID> &7- 删除指定的地牢实例（管理员）"
