  usage: "&c用法错误，请使用 &e/dungeon help &c查看具体用法。"
  help:
    - "&6===== {plugin} 帮助 ====="
    - "&e/dungeon <子命令>"
    - "&7可用子命令:"
    - "&a  help &7- 显示此帮助信息"
    - "&a  list &7- 列出所有地牢及其实例状态"
    - "&a  enter <实例ID> &7- 进入指定地牢实例（格式：地牢ID_实例ID）"
    - "&a  exit &7- 离开副本"
    - "&a  shop &7- 打开配装商店（装备/近战/远程/补给）"
    - "&a  storage &7- 打开仓库"
